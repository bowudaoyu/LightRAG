services:
  postgres:
    image: daoyu/pg_vector_age:latest
    container_name: lightrag-postgres
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: "lightrag"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lightrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  lightrag:
    build: .
    container_name: lightrag-server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9621:9621"
    env_file:
      - .env
    environment:
      # Postgres Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DATABASE: "lightrag"
      
      # Storage Configuration (Switch to PostgreSQL)
      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
      LIGHTRAG_GRAPH_STORAGE: PGGraphStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      
      # Embedding Model Configuration (Local)
      # Accessible at http://localhost:9997/v1/embeddings (via OpenAI binding)
      EMBEDDING_BINDING: openai
      EMBEDDING_BINDING_HOST: http://host.docker.internal:9997/v1/embeddings
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_DIM: 1024
      
      # Reranking Model Configuration (Local)
      # Accessible at http://localhost:9997/v1/rerank (via Cohere binding)
      RERANK_BINDING: cohere
      RERANK_BINDING_HOST: http://host.docker.internal:9997/v1/rerank
      RERANK_MODEL: bge-reranker-v2-m3
      
      # Note: LLM settings are inherited from .env unless overridden here.
      # If using local LLM, ensure LLM_BINDING_HOST is also set correctly.
      
    volumes:
      - ./rag_storage:/app/rag_storage
      - ./inputs:/app/inputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
